<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>오늘 뭐먹지 🍚</title>
<link href="https://fonts.googleapis.com/css2?family=Nanum+Gothic:wght@400;700;800&family=Black+Han+Sans&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --yellow: #FFE135;
    --orange: #FF6B35;
    --red: #FF3B3B;
    --dark: #1a1208;
    --cream: #FFF9EC;
  }

  body {
    font-family: 'Nanum Gothic', sans-serif;
    background: var(--cream);
    min-height: 100vh;
    overflow-x: hidden;
    cursor: url("data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' width='32' height='32'><text y='28' font-size='28'>🍴</text></svg>") 16 16, auto;
  }

  /* 배경 패턴 */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: 
      radial-gradient(circle at 20% 20%, rgba(255,225,53,0.15) 0%, transparent 50%),
      radial-gradient(circle at 80% 80%, rgba(255,107,53,0.1) 0%, transparent 50%);
    pointer-events: none;
    z-index: 0;
  }

  .wrapper {
    position: relative;
    z-index: 1;
    max-width: 520px;
    margin: 0 auto;
    padding: 40px 20px 80px;
  }

  /* 헤더 */
  .header {
    text-align: center;
    margin-bottom: 40px;
  }

  .header-emoji {
    font-size: 72px;
    display: block;
    animation: bounce 2s ease-in-out infinite;
    margin-bottom: 8px;
  }
  @keyframes bounce {
    0%, 100% { transform: translateY(0) rotate(-5deg); }
    50% { transform: translateY(-12px) rotate(5deg); }
  }

  .header h1 {
    font-family: 'Black Han Sans', sans-serif;
    font-size: 42px;
    color: var(--dark);
    line-height: 1.1;
    letter-spacing: -1px;
  }
  .header h1 span {
    color: var(--orange);
    position: relative;
    display: inline-block;
  }
  .header h1 span::after {
    content: '';
    position: absolute;
    bottom: 2px;
    left: 0;
    width: 100%;
    height: 8px;
    background: var(--yellow);
    z-index: -1;
    transform: rotate(-1deg);
  }

  .header p {
    margin-top: 10px;
    color: #888;
    font-size: 14px;
  }

  /* 질문 카드 */
  .question-card {
    background: white;
    border-radius: 20px;
    padding: 24px;
    margin-bottom: 16px;
    border: 2.5px solid var(--dark);
    box-shadow: 5px 5px 0px var(--dark);
    transition: transform 0.15s, box-shadow 0.15s;
  }
  .question-card:hover {
    transform: translate(-2px, -2px);
    box-shadow: 7px 7px 0px var(--dark);
  }

  .q-label {
    font-size: 12px;
    font-weight: 800;
    color: var(--orange);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 8px;
  }
  .q-text {
    font-size: 17px;
    font-weight: 800;
    color: var(--dark);
    margin-bottom: 16px;
  }

  .options {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }

  .opt-btn {
    padding: 9px 16px;
    border-radius: 100px;
    border: 2px solid var(--dark);
    background: white;
    font-family: 'Nanum Gothic', sans-serif;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.15s;
    color: var(--dark);
  }
  .opt-btn:hover {
    background: var(--yellow);
    transform: scale(1.05);
  }
  .opt-btn.selected {
    background: var(--dark);
    color: var(--yellow);
    transform: scale(1.05);
  }

  /* 슬라이더 */
  .budget-display {
    font-size: 28px;
    font-weight: 800;
    color: var(--orange);
    font-family: 'Black Han Sans', sans-serif;
    margin-bottom: 12px;
  }
  input[type=range] {
    width: 100%;
    height: 8px;
    border-radius: 4px;
    background: #eee;
    border: 2px solid var(--dark);
    outline: none;
    cursor: pointer;
    accent-color: var(--orange);
  }

  /* 추천 버튼 */
  .recommend-btn {
    width: 100%;
    padding: 20px;
    border-radius: 16px;
    border: 3px solid var(--dark);
    background: var(--orange);
    color: white;
    font-family: 'Black Han Sans', sans-serif;
    font-size: 24px;
    cursor: pointer;
    box-shadow: 5px 5px 0px var(--dark);
    transition: all 0.15s;
    margin-top: 8px;
    letter-spacing: 1px;
  }
  .recommend-btn:hover {
    transform: translate(-3px, -3px);
    box-shadow: 8px 8px 0px var(--dark);
  }
  .recommend-btn:active {
    transform: translate(2px, 2px);
    box-shadow: 3px 3px 0px var(--dark);
  }
  .recommend-btn.loading {
    background: #ccc;
    pointer-events: none;
    animation: shake 0.4s ease-in-out infinite;
  }
  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    25% { transform: translateX(-4px) rotate(-1deg); }
    75% { transform: translateX(4px) rotate(1deg); }
  }

  /* 결과 카드 */
  .result-card {
    display: none;
    background: var(--dark);
    border-radius: 24px;
    padding: 32px 28px;
    margin-top: 24px;
    border: 3px solid var(--dark);
    box-shadow: 6px 6px 0px var(--orange);
    animation: popIn 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
    text-align: center;
  }
  .result-card.show { display: block; }

  @keyframes popIn {
    0% { transform: scale(0.5) rotate(-5deg); opacity: 0; }
    100% { transform: scale(1) rotate(0deg); opacity: 1; }
  }

  .result-emoji {
    font-size: 80px;
    display: block;
    margin-bottom: 12px;
    animation: spin-in 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) 0.2s both;
  }
  @keyframes spin-in {
    0% { transform: scale(0) rotate(-180deg); }
    100% { transform: scale(1) rotate(0deg); }
  }

  .result-menu {
    font-family: 'Black Han Sans', sans-serif;
    font-size: 44px;
    color: var(--yellow);
    margin-bottom: 8px;
    line-height: 1.1;
  }

  .result-reason {
    font-size: 14px;
    color: rgba(255,255,255,0.75);
    line-height: 1.7;
    margin-bottom: 20px;
    padding: 0 8px;
  }

  .result-tags {
    display: flex;
    gap: 6px;
    justify-content: center;
    flex-wrap: wrap;
    margin-bottom: 24px;
  }
  .result-tag {
    padding: 4px 12px;
    border-radius: 100px;
    background: rgba(255,225,53,0.15);
    border: 1px solid rgba(255,225,53,0.4);
    font-size: 12px;
    color: var(--yellow);
    font-weight: 700;
  }

  .reroll-btn {
    padding: 14px 28px;
    border-radius: 12px;
    border: 2px solid var(--yellow);
    background: transparent;
    color: var(--yellow);
    font-family: 'Black Han Sans', sans-serif;
    font-size: 16px;
    cursor: pointer;
    transition: all 0.15s;
    letter-spacing: 1px;
  }
  .reroll-btn:hover {
    background: var(--yellow);
    color: var(--dark);
    transform: scale(1.05);
  }

  /* 고민 멘트 */
  .thinking-msg {
    display: none;
    text-align: center;
    padding: 20px;
    font-size: 18px;
    font-weight: 800;
    color: var(--orange);
    animation: blink 0.8s ease-in-out infinite;
  }
  .thinking-msg.show { display: block; }
  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  /* 공유 버튼 */
  .share-row {
    display: flex;
    gap: 8px;
    justify-content: center;
    margin-top: 12px;
  }
  .share-btn {
    padding: 8px 16px;
    border-radius: 8px;
    border: 1.5px solid rgba(255,255,255,0.2);
    background: rgba(255,255,255,0.08);
    color: rgba(255,255,255,0.7);
    font-size: 12px;
    cursor: pointer;
    font-family: 'Nanum Gothic', sans-serif;
    font-weight: 700;
    transition: all 0.15s;
  }
  .share-btn:hover {
    background: rgba(255,255,255,0.15);
    color: white;
  }

  /* 카운터 */
  .counter {
    text-align: center;
    font-size: 12px;
    color: #bbb;
    margin-top: 32px;
  }
  .counter span {
    font-weight: 800;
    color: var(--orange);
  }

  /* 히스토리 */
  .history {
    margin-top: 32px;
  }
  .history-title {
    font-size: 13px;
    font-weight: 800;
    color: #888;
    margin-bottom: 10px;
    text-align: center;
  }
  .history-chips {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    justify-content: center;
  }
  .history-chip {
    padding: 5px 12px;
    border-radius: 100px;
    background: white;
    border: 2px solid #eee;
    font-size: 12px;
    color: #666;
    font-weight: 700;
  }
  .history-chip:first-child {
    border-color: var(--orange);
    color: var(--orange);
  }
</style>
</head>
<body>
<div class="wrapper">

  <div class="header">
    <span class="header-emoji">🍱</span>
    <h1>오늘 <span>뭐먹지</span></h1>
    <p>매일 12시의 최대 난제를 해결해드립니다 ㅋㅋ</p>
  </div>

  <!-- Q1: 지금 기분 -->
  <div class="question-card">
    <div class="q-label">Q1</div>
    <div class="q-text">지금 기분이 어때요? 😐</div>
    <div class="options" id="mood-options">
      <button class="opt-btn" onclick="select(this,'mood','행복')">😊 행복</button>
      <button class="opt-btn" onclick="select(this,'mood','피곤')">😩 피곤해 죽겠음</button>
      <button class="opt-btn" onclick="select(this,'mood','스트레스')">🤯 스트레스</button>
      <button class="opt-btn" onclick="select(this,'mood','배고픔')">😤 그냥 배고픔</button>
      <button class="opt-btn" onclick="select(this,'mood','무기력')">😶 무기력</button>
    </div>
  </div>

  <!-- Q2: 뭐 땡겨 -->
  <div class="question-card">
    <div class="q-label">Q2</div>
    <div class="q-text">뭐가 땡겨요? 🤤</div>
    <div class="options" id="craving-options">
      <button class="opt-btn" onclick="select(this,'craving','매운거')">🌶️ 매운거</button>
      <button class="opt-btn" onclick="select(this,'craving','든든한거')">💪 든든한거</button>
      <button class="opt-btn" onclick="select(this,'craving','가벼운거')">🥗 가벼운거</button>
      <button class="opt-btn" onclick="select(this,'craving','국물')">🍜 국물</button>
      <button class="opt-btn" onclick="select(this,'craving','아무거나')">🎲 아무거나</button>
      <button class="opt-btn" onclick="select(this,'craving','단거')">🍰 단거도 먹고싶음</button>
    </div>
  </div>

  <!-- Q3: 함께? -->
  <div class="question-card">
    <div class="q-label">Q3</div>
    <div class="q-text">누구랑 먹어요? 👥</div>
    <div class="options" id="who-options">
      <button class="opt-btn" onclick="select(this,'who','혼자')">🧍 혼밥</button>
      <button class="opt-btn" onclick="select(this,'who','동료')">👔 직장동료</button>
      <button class="opt-btn" onclick="select(this,'who','친구')">🤝 친구</button>
      <button class="opt-btn" onclick="select(this,'who','상사')">😰 상사랑 (도와줘)</button>
    </div>
  </div>

  <!-- Q4: 예산 -->
  <div class="question-card">
    <div class="q-label">Q4</div>
    <div class="q-text">예산은요? 💸</div>
    <div class="budget-display" id="budget-display">1만원</div>
    <input type="range" min="5000" max="30000" step="1000" value="10000"
      oninput="updateBudget(this.value)" id="budget-slider">
  </div>

  <!-- 추천 버튼 -->
  <button class="recommend-btn" id="rec-btn" onclick="recommend()">
    🍽️ 오늘의 메뉴 뽑아줘!
  </button>

  <div class="thinking-msg" id="thinking">
    🤔 열심히 고민 중... (사실 그냥 랜덤임 ㅋ)
  </div>

  <!-- 결과 -->
  <div class="result-card" id="result-card">
    <span class="result-emoji" id="result-emoji">🍜</span>
    <div class="result-menu" id="result-menu">부대찌개</div>
    <div class="result-tags" id="result-tags"></div>
    <div class="result-reason" id="result-reason"></div>
    <button class="reroll-btn" onclick="recommend()">🎲 다시 뽑기</button>
    <div class="share-row">
      <button class="share-btn" onclick="copyResult()">🔗 링크 복사</button>
      <button class="share-btn" onclick="shareKakao()">💬 카톡 공유</button>
    </div>
  </div>

  <!-- 히스토리 -->
  <div class="history" id="history-section" style="display:none">
    <div class="history-title">오늘 뽑은 메뉴들</div>
    <div class="history-chips" id="history-chips"></div>
  </div>

  <div class="counter">
    지금까지 <span id="count-display">0</span>명이 고민 해결함 ㅋㅋ
  </div>

</div>

<script>
const state = { mood: '', craving: '', who: '', budget: 10000 };
const history = [];
let count = Math.floor(Math.random() * 3000) + 12847;
document.getElementById('count-display').textContent = count.toLocaleString();

function select(btn, key, val) {
  const group = btn.closest('.options');
  group.querySelectorAll('.opt-btn').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
  state[key] = val;
}

function updateBudget(val) {
  state.budget = parseInt(val);
  const display = state.budget >= 10000
    ? (state.budget / 10000).toFixed(state.budget % 10000 === 0 ? 0 : 1) + '만원'
    : (state.budget / 1000) + '천원';
  document.getElementById('budget-display').textContent = display;
}

const menus = [
  // 매운거
  { name:'부대찌개', emoji:'🍲', tags:['매운', '든든', '국물'], reason:'스트레스엔 역시 부대찌개. 햄이랑 라면 넣고 끓이면 세상 다 가진 기분', budget:[6000,15000], craving:['매운거','국물'], mood:['스트레스','피곤'] },
  { name:'떡볶이', emoji:'🌶️', tags:['매운', '저렴', '간식'], reason:'기분 꽝일 때 떡볶이 한 접시면 해결됨. 매운 거 먹으면 엔돌핀 나온다고요', budget:[4000,8000], craving:['매운거','아무거나'], mood:['스트레스','무기력'] },
  { name:'마라탕', emoji:'🫕', tags:['매운', '트렌디', '중독성'], reason:'마라탕 한 번 맛들이면 못 끊음. 오늘도 마라탕 드가자', budget:[10000,20000], craving:['매운거','아무거나'], mood:['행복','스트레스'] },
  { name:'불닭볶음면', emoji:'🔥', tags:['극매운', '혼밥', '빠름'], reason:'진짜 매운 거 원하면 이거지. 눈물 콧물 다 빼고 나면 개운함', budget:[3000,6000], craving:['매운거'], mood:['스트레스','무기력'] },

  // 국물
  { name:'순대국밥', emoji:'🥣', tags:['국물', '든든', '가성비'], reason:'순대국밥은 직장인의 소울푸드. 새우젓 팍팍 넣어서 드세요', budget:[7000,10000], craving:['국물','든든한거'], mood:['피곤','배고픔'] },
  { name:'설렁탕', emoji:'🍶', tags:['국물', '깔끔', '보양'], reason:'피곤할 때는 설렁탕. 뽀얀 국물이 몸 보신시켜줌', budget:[9000,14000], craving:['국물','가벼운거'], mood:['피곤','무기력'] },
  { name:'김치찌개', emoji:'🍲', tags:['국물', '한식', '든든'], reason:'김치찌개에 밥 말아서 먹으면 세상 부러울 게 없음. 클래식은 배신 안 함', budget:[8000,12000], craving:['국물','매운거'], mood:['배고픔','행복'] },
  { name:'칼국수', emoji:'🍜', tags:['국물', '따뜻', '가벼운'], reason:'뭔가 따뜻한 게 먹고 싶을 때 딱임. 바지락 칼국수면 더 좋고', budget:[8000,13000], craving:['국물','가벼운거'], mood:['피곤','무기력'] },

  // 든든한거
  { name:'삼겹살 덮밥', emoji:'🥩', tags:['든든', '고기', '만족'], reason:'고기 없으면 못 사는 사람들을 위한 선택. 오늘 하루도 고기로 버텨봐요', budget:[9000,14000], craving:['든든한거'], mood:['배고픔','행복'] },
  { name:'치킨', emoji:'🍗', tags:['든든', '치킨', '행복'], reason:'치킨은 언제나 옳다. 이걸 반박할 수 있는 사람이 없음', budget:[18000,30000], craving:['든든한거','아무거나'], mood:['행복','스트레스'] },
  { name:'돈카츠', emoji:'🥩', tags:['든든', '바삭', '일식'], reason:'바삭한 돈카츠에 밥이랑 먹으면... 행복이 뭔지 알 것 같음', budget:[10000,18000], craving:['든든한거'], mood:['행복','배고픔'] },
  { name:'제육볶음 백반', emoji:'🍱', tags:['든든', '매운', '한식'], reason:'직장인 점심의 정석. 제육볶음에 된장찌개 세트면 완벽한 점심', budget:[8000,12000], craving:['든든한거','매운거'], mood:['피곤','배고픔'] },

  // 가벼운거
  { name:'샐러드', emoji:'🥗', tags:['가벼운', '건강', '다이어트'], reason:'오늘만큼은 건강하게 살아보자... 는 마음. 내일은 또 모르지만', budget:[10000,18000], craving:['가벼운거'], mood:['행복','무기력'] },
  { name:'김밥', emoji:'🍙', tags:['가벼운', '간편', '가성비'], reason:'김밥이 최고야. 빠르고 맛있고 싸고. 참치 마요 강력 추천', budget:[3000,6000], craving:['가벼운거','아무거나'], mood:['무기력','배고픔'] },
  { name:'우동', emoji:'🍜', tags:['가벼운', '국물', '빠름'], reason:'우동은 실패 없는 선택. 온우동으로 위장도 달래고 마음도 달래고', budget:[7000,11000], craving:['가벼운거','국물'], mood:['피곤','무기력'] },
  { name:'쌀국수', emoji:'🍝', tags:['가벼운', '이국적', '깔끔'], reason:'느끼하지 않고 깔끔한 게 먹고 싶을 때. 숙주 팍팍 넣어서 먹으면 맛있음', budget:[9000,14000], craving:['가벼운거','국물'], mood:['행복','무기력'] },

  // 상사랑 먹을 때
  { name:'한정식', emoji:'🍱', tags:['고급', '상사용', '안전'], reason:'상사랑 밥 먹을 땐 한정식. 절대 실패 없고 눈치 안 봐도 됨', budget:[20000,30000], craving:['아무거나'], who:['상사'] },
  { name:'일식당 (초밥)', emoji:'🍣', tags:['고급', '상사용', '세련'], reason:'상사한테 잘 보이고 싶으면 초밥집. 분위기도 있고 말도 많이 안 해도 됨', budget:[20000,30000], craving:['아무거나'], who:['상사'] },
  { name:'양식 레스토랑', emoji:'🍝', tags:['고급', '상사용', '분위기'], reason:'격식 있는 자리엔 양식. 파스타 시켜놓고 포크질 잘 하는 척 해봐요', budget:[18000,30000], craving:['아무거나'], who:['상사'] },
];

const funReasons = [
  name => `${name}? 운명이다. 이건 우주가 정해준 거임`,
  name => `오늘 ${name} 안 먹으면 후회함. 내가 보장함`,
  name => `AI가 열심히 계산한 결과 → ${name}. (사실 랜덤ㅋ)`,
  name => `${name}!! 이걸 보는 순간 이미 먹고 싶어진 거 맞죠?`,
  name => `${name} 드세요. 안 맛있으면 제 탓 아님`,
];

function recommend() {
  const btn = document.getElementById('rec-btn');
  const thinking = document.getElementById('thinking');
  const result = document.getElementById('result-card');

  btn.classList.add('loading');
  btn.textContent = '🤔 고민중...';
  thinking.classList.add('show');
  result.classList.remove('show');

  setTimeout(() => {
    btn.classList.remove('loading');
    btn.textContent = '🍽️ 오늘의 메뉴 뽑아줘!';
    thinking.classList.remove('show');

    // 필터링
    let filtered = menus.filter(m => {
      if (state.who === '상사' && m.who && m.who.includes('상사')) return true;
      if (state.who === '상사') return false;
      if (m.budget && (state.budget < m.budget[0] || state.budget > m.budget[1] * 1.5)) return false;
      return true;
    });

    // 가중치 적용
    let scored = filtered.map(m => {
      let score = Math.random() * 10;
      if (state.craving && m.craving && m.craving.includes(state.craving)) score += 15;
      if (state.mood && m.mood && m.mood.includes(state.mood)) score += 10;
      return { ...m, score };
    });

    scored.sort((a, b) => b.score - a.score);
    const pick = scored[Math.floor(Math.random() * Math.min(3, scored.length))];

    // 결과 표시
    document.getElementById('result-emoji').textContent = pick.emoji;
    document.getElementById('result-menu').textContent = pick.name;

    const tagsEl = document.getElementById('result-tags');
    tagsEl.innerHTML = pick.tags.map(t => `<span class="result-tag">${t}</span>`).join('');

    const reasonFn = funReasons[Math.floor(Math.random() * funReasons.length)];
    document.getElementById('result-reason').textContent = pick.reason || reasonFn(pick.name);

    result.classList.add('show');

    // 히스토리
    history.unshift(pick.name);
    if (history.length > 6) history.pop();
    updateHistory();

    // 카운터
    count += Math.floor(Math.random() * 3) + 1;
    document.getElementById('count-display').textContent = count.toLocaleString();

    result.scrollIntoView({ behavior: 'smooth', block: 'center' });
  }, 1400);
}

function updateHistory() {
  const section = document.getElementById('history-section');
  const chips = document.getElementById('history-chips');
  section.style.display = 'block';
  chips.innerHTML = history.map((name, i) =>
    `<div class="history-chip">${i === 0 ? '✨ ' : ''}${name}</div>`
  ).join('');
}

function copyResult() {
  const menu = document.getElementById('result-menu').textContent;
  const text = `오늘 점심 뭐먹을지 AI한테 물어봤더니 "${menu}" 래요 ㅋㅋㅋ\n나도 한번 해봐: ${window.location.href}`;
  navigator.clipboard.writeText(text).then(() => alert('복사됐어요! 친구한테 공유해봐요 😄'));
}

function shareKakao() {
  alert('카카오 SDK 연동이 필요해요!\n(배포 후 설정 가능)');
}
</script>
