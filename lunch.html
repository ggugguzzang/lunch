<head>

<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --yellow: #FFE135;
    --orange: #FF6B35;
    --red: #FF3B3B;
    --dark: #1a1208;
    --cream: #FFF9EC;
  }

  body {
    font-family: 'Nanum Gothic', sans-serif;
    background: var(--cream);
    min-height: 100vh;
    overflow-x: hidden;
    cursor: url("data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' width='32' height='32'><text y='28' font-size='28'>🍴</text></svg>") 16 16, auto;
  }

  /* 배경 패턴 */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: 
      radial-gradient(circle at 20% 20%, rgba(255,225,53,0.15) 0%, transparent 50%),
      radial-gradient(circle at 80% 80%, rgba(255,107,53,0.1) 0%, transparent 50%);
    pointer-events: none;
    z-index: 0;
  }

  .wrapper {
    position: relative;
    z-index: 1;
    max-width: 520px;
    margin: 0 auto;
    padding: 40px 20px 80px;
  }

  /* 헤더 */
  .header {
    text-align: center;
    margin-bottom: 40px;
  }

  .header-emoji {
    font-size: 72px;
    display: block;
    animation: bounce 2s ease-in-out infinite;
    margin-bottom: 8px;
  }
  @keyframes bounce {
    0%, 100% { transform: translateY(0) rotate(-5deg); }
    50% { transform: translateY(-12px) rotate(5deg); }
  }

  .header h1 {
    font-family: 'Black Han Sans', sans-serif;
    font-size: 42px;
    color: var(--dark);
    line-height: 1.1;
    letter-spacing: -1px;
  }
  .header h1 span {
    color: var(--orange);
    position: relative;
    display: inline-block;
  }
  .header h1 span::after {
    content: '';
    position: absolute;
    bottom: 2px;
    left: 0;
    width: 100%;
    height: 8px;
    background: var(--yellow);
    z-index: -1;
    transform: rotate(-1deg);
  }

  .header p {
    margin-top: 10px;
    color: #888;
    font-size: 14px;
  }

  /* 질문 카드 */
  .question-card {
    background: white;
    border-radius: 20px;
    padding: 24px;
    margin-bottom: 16px;
    border: 2.5px solid var(--dark);
    box-shadow: 5px 5px 0px var(--dark);
    transition: transform 0.15s, box-shadow 0.15s;
  }
  .question-card:hover {
    transform: translate(-2px, -2px);
    box-shadow: 7px 7px 0px var(--dark);
  }

  .q-label {
    font-size: 12px;
    font-weight: 800;
    color: var(--orange);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 8px;
  }
  .q-text {
    font-size: 17px;
    font-weight: 800;
    color: var(--dark);
    margin-bottom: 16px;
  }

  .options {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }

  .opt-btn {
    padding: 9px 16px;
    border-radius: 100px;
    border: 2px solid var(--dark);
    background: white;
    font-family: 'Nanum Gothic', sans-serif;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.15s;
    color: var(--dark);
  }
  .opt-btn:hover {
    background: var(--yellow);
    transform: scale(1.05);
  }
  .opt-btn.selected {
    background: var(--dark);
    color: var(--yellow);
    transform: scale(1.05);
  }

  /* 슬라이더 */
  .budget-display {
    font-size: 28px;
    font-weight: 800;
    color: var(--orange);
    font-family: 'Black Han Sans', sans-serif;
    margin-bottom: 12px;
  }
  input[type=range] {
    width: 100%;
    height: 8px;
    border-radius: 4px;
    background: #eee;
    border: 2px solid var(--dark);
    outline: none;
    cursor: pointer;
    accent-color: var(--orange);
  }

  /* 추천 버튼 */
  .recommend-btn {
    width: 100%;
    padding: 20px;
    border-radius: 16px;
    border: 3px solid var(--dark);
    background: var(--orange);
    color: white;
    font-family: 'Black Han Sans', sans-serif;
    font-size: 24px;
    cursor: pointer;
    box-shadow: 5px 5px 0px var(--dark);
    transition: all 0.15s;
    margin-top: 8px;
    letter-spacing: 1px;
  }
  .recommend-btn:hover {
    transform: translate(-3px, -3px);
    box-shadow: 8px 8px 0px var(--dark);
  }
  .recommend-btn:active {
    transform: translate(2px, 2px);
    box-shadow: 3px 3px 0px var(--dark);
  }
  .recommend-btn.loading {
    background: #ccc;
    pointer-events: none;
    animation: shake 0.4s ease-in-out infinite;
  }
  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    25% { transform: translateX(-4px) rotate(-1deg); }
    75% { transform: translateX(4px) rotate(1deg); }
  }

  /* 결과 카드 */
  .result-card {
    display: none;
    background: var(--dark);
    border-radius: 24px;
    padding: 32px 28px;
    margin-top: 24px;
    border: 3px solid var(--dark);
    box-shadow: 6px 6px 0px var(--orange);
    animation: popIn 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
    text-align: center;
  }
  .result-card.show { display: block; }

  @keyframes popIn {
    0% { transform: scale(0.5) rotate(-5deg); opacity: 0; }
    100% { transform: scale(1) rotate(0deg); opacity: 1; }
  }

  .result-emoji {
    font-size: 80px;
    display: block;
    margin-bottom: 12px;
    animation: spin-in 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) 0.2s both;
  }
  @keyframes spin-in {
    0% { transform: scale(0) rotate(-180deg); }
    100% { transform: scale(1) rotate(0deg); }
  }

  .result-menu {
    font-family: 'Black Han Sans', sans-serif;
    font-size: 44px;
    color: var(--yellow);
    margin-bottom: 8px;
    line-height: 1.1;
  }

  .result-reason {
    font-size: 14px;
    color: rgba(255,255,255,0.75);
    line-height: 1.7;
    margin-bottom: 20px;
    padding: 0 8px;
  }

  .result-tags {
    display: flex;
    gap: 6px;
    justify-content: center;
    flex-wrap: wrap;
    margin-bottom: 24px;
  }
  .result-tag {
    padding: 4px 12px;
    border-radius: 100px;
    background: rgba(255,225,53,0.15);
    border: 1px solid rgba(255,225,53,0.4);
    font-size: 12px;
    color: var(--yellow);
    font-weight: 700;
  }

  .reroll-btn {
    padding: 14px 28px;
    border-radius: 12px;
    border: 2px solid var(--yellow);
    background: transparent;
    color: var(--yellow);
    font-family: 'Black Han Sans', sans-serif;
    font-size: 16px;
    cursor: pointer;
    transition: all 0.15s;
    letter-spacing: 1px;
  }
  .reroll-btn:hover {
    background: var(--yellow);
    color: var(--dark);
    transform: scale(1.05);
  }

  /* 고민 멘트 */
  .thinking-msg {
    display: none;
    text-align: center;
    padding: 20px;
    font-size: 18px;
    font-weight: 800;
    color: var(--orange);
    animation: blink 0.8s ease-in-out infinite;
  }
  .thinking-msg.show { display: block; }
  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  /* 공유 버튼 */
  .share-row {
    display: flex;
    gap: 8px;
    justify-content: center;
    margin-top: 12px;
  }
  .share-btn {
    padding: 8px 16px;
    border-radius: 8px;
    border: 1.5px solid rgba(255,255,255,0.2);
    background: rgba(255,255,255,0.08);
    color: rgba(255,255,255,0.7);
    font-size: 12px;
    cursor: pointer;
    font-family: 'Nanum Gothic', sans-serif;
    font-weight: 700;
    transition: all 0.15s;
  }
  .share-btn:hover {
    background: rgba(255,255,255,0.15);
    color: white;
  }

  /* 카운터 */
  .counter {
    text-align: center;
    font-size: 12px;
    color: #bbb;
    margin-top: 32px;
  }
  .counter span {
    font-weight: 800;
    color: var(--orange);
  }

  /* 히스토리 */
  .history {
    margin-top: 32px;
  }
  .history-title {
    font-size: 13px;
    font-weight: 800;
    color: #888;
    margin-bottom: 10px;
    text-align: center;
  }
  .history-chips {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    justify-content: center;
  }
  .history-chip {
    padding: 5px 12px;
    border-radius: 100px;
    background: white;
    border: 2px solid #eee;
    font-size: 12px;
    color: #666;
    font-weight: 700;
  }
  .history-chip:first-child {
    border-color: var(--orange);
    color: var(--orange);
  }
</style>
</head>
<body>
<div class="wrapper">

  <div class="header">
    <span class="header-emoji">🍱</span>
    <h1>오늘 <span>뭐먹지</span></h1>
    <p>매일 12시의 최대 난제를 해결해드립니다 ㅋㅋ</p>
  </div>

  <!-- Q1: 지금 기분 -->
  <div class="question-card">
    <div class="q-label">Q1</div>
    <div class="q-text">지금 기분이 어때요? 😐</div>
    <div class="options" id="mood-options">
      <button class="opt-btn" onclick="select(this,'mood','행복')">😊 행복</button>
      <button class="opt-btn" onclick="select(this,'mood','피곤')">😩 피곤해 죽겠음</button>
      <button class="opt-btn" onclick="select(this,'mood','스트레스')">🤯 스트레스</button>
      <button class="opt-btn" onclick="select(this,'mood','배고픔')">😤 그냥 배고픔</button>
      <button class="opt-btn" onclick="select(this,'mood','무기력')">😶 무기력</button>
    </div>
  </div>

  <!-- Q2: 뭐 땡겨 -->
  <div class="question-card">
    <div class="q-label">Q2</div>
    <div class="q-text">뭐가 땡겨요? 🤤</div>
    <div class="options" id="craving-options">
      <button class="opt-btn" onclick="select(this,'craving','매운거')">🌶️ 매운거</button>
      <button class="opt-btn" onclick="select(this,'craving','든든한거')">💪 든든한거</button>
      <button class="opt-btn" onclick="select(this,'craving','가벼운거')">🥗 가벼운거</button>
      <button class="opt-btn" onclick="select(this,'craving','국물')">🍜 국물</button>
      <button class="opt-btn" onclick="select(this,'craving','아무거나')">🎲 아무거나</button>
      <button class="opt-btn" onclick="select(this,'craving','단거')">🍰 단거도 먹고싶음</button>
    </div>
  </div>

  <!-- Q3: 함께? -->
  <div class="question-card">
    <div class="q-label">Q3</div>
    <div class="q-text">누구랑 먹어요? 👥</div>
    <div class="options" id="who-options">
      <button class="opt-btn" onclick="select(this,'who','혼자')">🧍 혼밥</button>
      <button class="opt-btn" onclick="select(this,'who','동료')">👔 직장동료</button>
      <button class="opt-btn" onclick="select(this,'who','친구')">🤝 친구</button>
      <button class="opt-btn" onclick="select(this,'who','상사')">😰 상사랑 (도와줘)</button>
    </div>
  </div>

  <!-- Q4: 예산 -->
  <div class="question-card">
    <div class="q-label">Q4</div>
    <div class="q-text">예산은요? 💸</div>
    <div class="budget-display" id="budget-display">1만원</div>
    <input type="range" min="5000" max="30000" step="1000" value="10000"
      oninput="updateBudget(this.value)" id="budget-slider">
  </div>

  <!-- 추천 버튼 -->
  <button class="recommend-btn" id="rec-btn" onclick="recommend()">
    🍽️ 오늘의 메뉴 뽑아줘!
  </button>

  <div class="thinking-msg" id="thinking">
    🤔 열심히 고민 중... (사실 그냥 랜덤임 ㅋ)
  </div>

  <!-- 결과 -->
  <div class="result-card" id="result-card">
    <span class="result-emoji" id="result-emoji">🍜</span>
    <div class="result-menu" id="result-menu">부대찌개</div>
    <div class="result-tags" id="result-tags"></div>
    <div class="result-reason" id="result-reason"></div>
    <button class="reroll-btn" onclick="recommend()">🎲 다시 뽑기</button>
    <div class="share-row">
      <button class="share-btn" onclick="copyResult()">🔗 링크 복사</button>
      <button class="share-btn" onclick="shareKakao()">💬 카톡 공유</button>
    </div>
  </div>

  <!-- 히스토리 -->
  <div class="history" id="history-section" style="display:none">
    <div class="history-title">오늘 뽑은 메뉴들</div>
    <div class="history-chips" id="history-chips"></div>
  </div>

  <div class="counter">
    지금까지 <span id="count-display">0</span>명이 고민 해결함 ㅋㅋ
  </div>

  <!-- 쿠팡 파트너스 -->
  <div style="margin-top:28px;text-align:center;">
    <a href="https://link.coupang.com/a/d2hcfJ" target="_blank" referrerpolicy="unsafe-url">
      <img src="https://ads-partners.coupang.com/banners/971654?subId=&traceId=V0-301-8be2627c04ed5569-I971654&w=728&h=90" alt="" style="width:100%;max-width:728px;border-radius:10px;">
    </a>
  </div>
  <div style="text-align:center;font-size:10px;color:#bbb;margin-top:6px;">
    이 포스팅은 쿠팡 파트너스 활동의 일환으로, 이에 따른 일정액의 수수료를 제공받습니다.
  </div>

</div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getDatabase, ref, runTransaction, onValue } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js';

const app = initializeApp({ databaseURL: "https://lunch-counter-16817-default-rtdb.asia-southeast1.firebasedatabase.app" });
const db = getDatabase(app);
const countRef = ref(db, 'count');

onValue(countRef, (snap) => {
  document.getElementById('count-display').textContent = (snap.val() || 0).toLocaleString();
});

window._incrementCount = function() {
  runTransaction(countRef, (cur) => (cur || 0) + 1);
};
</script>

<script>
const state = { mood: '', craving: '', who: '', budget: 10000 };
const history = [];

function select(btn, key, val) {
  const group = btn.closest('.options');
  group.querySelectorAll('.opt-btn').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
  state[key] = val;
}

function updateBudget(val) {
  state.budget = parseInt(val);
  const display = state.budget >= 10000
    ? (state.budget / 10000).toFixed(state.budget % 10000 === 0 ? 0 : 1) + '만원'
    : (state.budget / 1000) + '천원';
  document.getElementById('budget-display').textContent = display;
}

const menus = [
  // ─── 매운거 ───
  { name:'부대찌개', emoji:'🍲', tags:['매운','든든','국물'], reason:'스트레스엔 역시 부대찌개. 햄이랑 라면 넣고 끓이면 세상 다 가진 기분', budget:[6000,15000], craving:['매운거','국물'], mood:['스트레스','피곤'] },
  { name:'떡볶이', emoji:'🌶️', tags:['매운','저렴','분식'], reason:'기분 꽝일 때 떡볶이 한 접시면 해결됨. 로제 떡볶이도 요즘 핫함', budget:[4000,9000], craving:['매운거','아무거나'], mood:['스트레스','무기력'] },
  { name:'마라탕', emoji:'🫕', tags:['매운','트렌디','중독성'], reason:'마라탕 한 번 맛들이면 못 끊음. 오늘도 마라탕 드가자', budget:[10000,20000], craving:['매운거','아무거나'], mood:['행복','스트레스'] },
  { name:'불닭볶음면', emoji:'🔥', tags:['극매운','혼밥','빠름'], reason:'진짜 매운 거 원하면 이거지. 눈물 콧물 다 빼고 나면 개운함', budget:[3000,6000], craving:['매운거'], mood:['스트레스','무기력'] },
  { name:'낙지볶음', emoji:'🐙', tags:['매운','해물','밥도둑'], reason:'낙지볶음은 밥도둑 그 자체. 공기밥 두 그릇 각오해야 함', budget:[10000,16000], craving:['매운거','든든한거'], mood:['스트레스','배고픔'] },
  { name:'엽기떡볶이', emoji:'🌶️', tags:['극매운','트렌디','분식'], reason:'엽떡은 레벨 선택이 관건. 처음이면 보통으로 시작해요', budget:[10000,20000], craving:['매운거'], mood:['스트레스','행복'] },
  { name:'김치찜', emoji:'🥘', tags:['매운','든든','국물'], reason:'김치찜에 두부랑 돼지고기 넣으면 그게 바로 행복', budget:[9000,15000], craving:['매운거','국물'], mood:['피곤','배고픔'] },
  { name:'순두부찌개', emoji:'🍲', tags:['매운','국물','든든'], reason:'빨간 순두부찌개에 밥 한 공기. 이거면 하루 버팀', budget:[8000,12000], craving:['매운거','국물'], mood:['피곤','배고픔'] },
  { name:'닭발', emoji:'🍗', tags:['극매운','도전','술안주'], reason:'닭발은 용기 있는 자의 음식. 뼈째 씹는 그 맛', budget:[10000,18000], craving:['매운거'], mood:['스트레스','행복'] },
  { name:'불닭 치킨', emoji:'🔥', tags:['극매운','치킨','든든'], reason:'매운 치킨은 인생의 희로애락을 담고 있음. 오늘은 매운 맛으로 가즈아', budget:[18000,28000], craving:['매운거','든든한거'], mood:['스트레스','행복'] },

  // ─── 국물 ───

  { name:'양식 레스토랑', emoji:'🍝', tags:['고급','상사용','분위기'], reason:'격식 있는 자리엔 양식. 파스타 시켜놓고 포크질 잘 하는 척 해봐요', budget:[18000,30000], craving:['아무거나'], who:['상사'] },
  { name:'스테이크하우스', emoji:'🥩', tags:['고급','상사용','고기'], reason:'상사가 고기 좋아하면 스테이크하우스. 와인 한 잔 곁들이면 금상첨화', budget:[25000,30000], craving:['아무거나'], who:['상사'] },
  { name:'중식 코스', emoji:'🥢', tags:['고급','상사용','중식'], reason:'격식 있는 중식당은 의외로 상사들이 좋아함. 안전한 선택', budget:[20000,30000], craving:['아무거나'], who:['상사'] },
  { name:'샤브샤브', emoji:'🥘', tags:['고급','상사용','건강'], reason:'샤브샤브는 건강한 척하면서 맛있게 먹을 수 있는 명당', budget:[18000,28000], craving:['아무거나'], who:['상사'] },
];

const funReasons = [
  name => `${name}? 운명이다. 이건 우주가 정해준 거임`,
  name => `오늘 ${name} 안 먹으면 후회함. 내가 보장함`,
  name => `AI가 열심히 계산한 결과 → ${name}. (사실 랜덤ㅋ)`,
  name => `${name}!! 이걸 보는 순간 이미 먹고 싶어진 거 맞죠?`,
  name => `${name} 드세요. 안 맛있으면 제 탓 아님`,
];

function recommend() {
  // 유효성 검사
  if (!state.mood) { alert('Q1. 지금 기분을 선택해주세요! 😊'); return; }
  if (!state.craving) { alert('Q2. 뭐가 땡기는지 선택해주세요! 🤤'); return; }
  if (!state.who) { alert('Q3. 누구랑 먹는지 선택해주세요! 👥'); return; }

  const btn = document.getElementById('rec-btn');
  const thinking = document.getElementById('thinking');
  const result = document.getElementById('result-card');

  btn.classList.add('loading');
  btn.textContent = '🤔 고민중...';
  thinking.classList.add('show');
  result.classList.remove('show');

  setTimeout(() => {
    btn.classList.remove('loading');
    btn.textContent = '🍽️ 오늘의 메뉴 뽑아줘!';
    thinking.classList.remove('show');

    // 필터링
    let filtered = menus.filter(m => {
      if (state.who === '상사' && m.who && m.who.includes('상사')) return true;
      if (state.who === '상사') return false;
      if (m.budget && (state.budget < m.budget[0] || state.budget > m.budget[1] * 1.5)) return false;
      return true;
    });

    // 가중치 적용
    let scored = filtered.map(m => {
      let score = Math.random() * 10;
      if (state.craving && m.craving && m.craving.includes(state.craving)) score += 15;
      if (state.mood && m.mood && m.mood.includes(state.mood)) score += 10;
      return { ...m, score };
    });

    scored.sort((a, b) => b.score - a.score);
    const pick = scored[Math.floor(Math.random() * Math.min(3, scored.length))];

    // 결과 표시
    document.getElementById('result-emoji').textContent = pick.emoji;
    document.getElementById('result-menu').textContent = pick.name;

    const tagsEl = document.getElementById('result-tags');
    tagsEl.innerHTML = pick.tags.map(t => `<span class="result-tag">${t}</span>`).join('');

    const reasonFn = funReasons[Math.floor(Math.random() * funReasons.length)];
    document.getElementById('result-reason').textContent = pick.reason || reasonFn(pick.name);

    result.classList.add('show');

    // 히스토리
    history.unshift(pick.name);
    if (history.length > 6) history.pop();
    updateHistory();

    // 카운터
    if (window._incrementCount) window._incrementCount();

    result.scrollIntoView({ behavior: 'smooth', block: 'center' });
  }, 1400);
}

function updateHistory() {
  const section = document.getElementById('history-section');
  const chips = document.getElementById('history-chips');
  section.style.display = 'block';
  chips.innerHTML = history.map((name, i) =>
    `<div class="history-chip">${i === 0 ? '✨ ' : ''}${name}</div>`
  ).join('');
}

function copyResult() {
  const menu = document.getElementById('result-menu').textContent;
  const text = `오늘 점심 뭐먹을지 AI한테 물어봤더니 "${menu}" 래요 ㅋㅋㅋ\n나도 한번 해봐: ${window.location.href}`;
  navigator.clipboard.writeText(text).then(() => alert('복사됐어요! 친구한테 공유해봐요 😄'));
}

function shareKakao() {
  alert('카카오 SDK 연동이 필요해요!\n(배포 후 설정 가능)');
}
